<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product List app</title>
  </head>
  <body>
    <label for="inputName">Name of Product</label>
    <input id="inputName" type="text" />
    <label for="inputPrice">Product Price</label>
    <input id="inputPrice" type="text" />
    <button id="addBtn">Add Product</button>
    <table>
      <!-- header -->
      <thead>
        <tr>
          <td>Name</td>
          <td>Price</td>
          <td>Status</td>
          <td>Action</td>
        </tr>
      </thead>
      <!-- body -->
      <tbody id="showData"></tbody>
    </table>
    <!-- Show Total Price -->
    <p id="showPrice">Total Price:</p>

    <script>
      // Input Box
      const inputName = document.getElementById("inputName");
      const inputPrice = document.getElementById("inputPrice");

      // Button
      const addBtn = document.getElementById("addBtn");

      // Table body
      const showData = document.getElementById("showData");
      const showPrice = document.getElementById("showPrice");

      // Store all products
      const products = [];
      let editingProduct = null;
      let editingRow = null;

      addBtn.addEventListener("click", addProduct);

      function addProduct() {
        const productName = inputName.value.trim();

        const priceText = inputPrice.value.trim();

        if (productName === "" || priceText === "" || isNaN(priceText)) {
          alert("Please input the product name and price.");
          return;
        }

        const productPrice = Number(priceText);

        // Updating Existing Product
        if (editingProduct) {
          editingProduct.name = inputName.value;
          editingProduct.price = Number(inputPrice.value);
          editingRow.dataName.textContent = editingProduct.name;
          editingRow.dataPrice.textContent = editingProduct.price;
          editingRow.dataStatus.textContent = editingProduct.price > 1000 ? 'Expensive' : 'Affordable';
          editingProduct = null;
          editingRow = null;
          addBtn.textContent = 'Add Product';
          load();
          return;
        }
        // Add Product
        const product = {
          name: productName,
          price: productPrice,
        };

        const tr = document.createElement("tr");

        const dataName = document.createElement("td");
        const dataPrice = document.createElement("td");
        const dataStatus = document.createElement("td");
        const dataAction = document.createElement("td");

        dataName.textContent = product.name;
        dataPrice.textContent = product.price;
        dataStatus.textContent =
          product.price > 1000 ? "Expensive" : "Affordable";

        const deleteBtn = createDeleteButton(tr, product);
        dataAction.appendChild(deleteBtn);
        const editBtn = createEditButton(tr, product, dataName, dataPrice, dataStatus);
        dataAction.appendChild(editBtn);

        tr.appendChild(dataName);
        tr.appendChild(dataPrice);
        tr.appendChild(dataStatus);
        tr.appendChild(dataAction);

        showData.appendChild(tr);

        products.push(product);

        load();
        
      }

      // delete button
      function createDeleteButton(tr, product) {
        const btnDelete = document.createElement("button");
        btnDelete.textContent = "Delete";

        btnDelete.addEventListener("click", () => {
          const index = products.indexOf(product);

          if (index !== -1) {
            products.splice(index, 1);
          }

          tr.remove();
          load();
        });

        return btnDelete;
      }
      // Edit button
      function createEditButton(tr, product, dataName, dataPrice, dataStatus) {
        const btnEdit = document.createElement('button');
        btnEdit.textContent = 'Edit';

        btnEdit.addEventListener('click', () => {
          // Put in the input box
          inputName.value = product.name;
          inputPrice.value = product.price;

          // Track edit
          editingProduct = product;
          editingRow = {tr, dataName, dataPrice, dataStatus};

          addBtn.textContent = 'Update';

        })
        return btnEdit;
      }


      // Render page when load
      function load() {
        inputName.value = "";
        inputPrice.value = "";

        const total = products.reduce((sum, product) => sum + product.price, 0);

        showPrice.textContent = `Total Price: ${total}`;
      }

      load();
    </script>
  </body>
</html>
